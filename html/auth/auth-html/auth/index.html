<!--
Here a simple HTML page that present a form to login
In case of success, it will hide the form and display a message with the connected username 
In case of error, a message is displayed below the form.
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src *; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval' http://localhost:3000; connect-src 'self' http://localhost:3000">
    <link rel="stylesheet" type="text/css" href="styles.css">
    <title>Login</title>
</head>
<body>
    <h1 class="mainTitle">Login to our system</h1>
    <form id="loginForm" onsubmit="">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
        <button type="submit">Login</button>
    </form>
    <div id="userInfo">
        <p id="welcomeMessage"><strong>Hello dear user, your are logged as</strong> <span id="usernameDisplay"></span></p>
    </div>
    <p id="errorMessage" style="color: red;"></p>
    <script src="callAPI.js"></script>
</body>
</html>
